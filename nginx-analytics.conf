server {
    listen 80;
    server_name _;

    # Analytics dashboard + tar1090 static files
    location /tar1090/ {
        alias /usr/share/nginx/html/tar1090/;
        index index.html;
        try_files $uri $uri/ /tar1090/index.html;
    }

    location /tar1090/aircraft_sil/ {
        alias /usr/share/nginx/html/aircraft_sil/;
    }

    location /aircraft_sil/ {
        alias /usr/share/nginx/html/aircraft_sil/;
    }

    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = / {
        return 302 /tar1090/analytics.html;
    }
}
